<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billetage Burkina Faso</title>
<meta name="description" content="Compteur de devises FCFA pour les péagistes">
<meta name="theme-color" content="#0F3D3E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F3D3E;
    --bg-deep: #0A2C2D;
    --paper: #F4EEDF;
    --paper-line: #D9CFB6;
    --ink: #1F2A24;
    --ink-soft: #5C6B62;
    --gold: #C9A227;
    --coral: #E2725B;
  }
  *{ box-sizing: border-box; }
  html, body{ height:100%; overflow:hidden; }
  body{
    margin:0;
    height:100vh;
    height:100dvh;
    background:
      radial-gradient(1200px 600px at 50% -10%, #15504F 0%, var(--bg) 55%, var(--bg-deep) 100%);
    font-family:'IBM Plex Sans', sans-serif;
    color: var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: clamp(6px, 2vh, 20px) clamp(8px, 3vw, 14px);
  }
  .receipt{
    width:100%;
    max-width: 420px;
    max-height: 100%;
    background: var(--paper);
    border-radius: 4px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .receipt::before, .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:10px;
    background:
      linear-gradient(135deg, var(--paper) 25%, transparent 26%) 0 0,
      linear-gradient(-135deg, var(--paper) 25%, transparent 26%) 0 0;
    background-size: 14px 14px;
    background-color: var(--bg-deep);
  }
  .receipt::before{ top:-1px; transform: rotate(180deg); }
  .receipt::after{ bottom:-1px; }

  .rows{
    padding: clamp(14px, 3.5vh, 24px) clamp(10px, 3vw, 18px) 4px;
    flex: 1 1 auto;
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    min-height:0;
  }
  .row{
    display:flex;
    align-items:center;
    gap: clamp(6px, 2vw, 12px);
    padding: clamp(4px, 1.2vh, 10px) 4px;
    border-bottom: 1px dashed var(--paper-line);
  }
  .row:last-child{ border-bottom: none; }

  .swatch{
    flex: 0 0 clamp(42px, 12vw, 54px);
    height: clamp(28px, 6vh, 36px);
    border-radius: 5px;
    position: relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12), 0 2px 5px rgba(0,0,0,0.28);
    background: #fff;
  }
  .swatch img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }
  .swatch.coin{
    flex-basis: clamp(28px, 6vh, 36px);
    width: clamp(28px, 6vh, 36px);
    height: clamp(28px, 6vh, 36px);
    border-radius: 50%;
  }
  .swatch.coin img{
    object-fit: cover;
    object-position: center;
  }

  .label-block{ flex: 1 1 auto; min-width: 58px; }
  .denom-label{
    font-family:'Fraunces', serif;
    font-size: clamp(12.5px, 3.6vw, 15px);
    font-weight: 600;
    line-height:1.15;
    white-space: normal;
    overflow-wrap: break-word;
  }
  .denom-sub{
    font-size: 10px;
    color: var(--ink-soft);
    font-family:'Space Mono', monospace;
  }

  .stepper{
    display:flex;
    align-items:center;
    gap: 0;
    flex: 0 0 auto;
    border: 1px solid var(--paper-line);
    border-radius: 6px;
    overflow:hidden;
    background: #fff;
  }
  .stepper button{
    width: clamp(24px, 7vw, 28px);
    height: clamp(24px, 6vh, 28px);
    border: none;
    background: transparent;
    font-size: 15px;
    font-family:'Space Mono', monospace;
    color: var(--ink);
    cursor:pointer;
  }
  .stepper button:active{ background: #eee5cf; }
  .stepper input{
    width: clamp(28px, 8vw, 34px);
    height: clamp(24px, 6vh, 28px);
    border: none;
    border-left: 1px solid var(--paper-line);
    border-right: 1px solid var(--paper-line);
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size: 12.5px;
    -moz-appearance: textfield;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button{
    -webkit-appearance: none; margin:0;
  }
  .stepper input:focus{
    outline: 2px solid var(--gold);
    outline-offset: -2px;
  }

  .line-total{
    flex: 0 0 clamp(58px, 16vw, 78px);
    text-align: right;
    font-family:'Space Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .line-total.active{ color: var(--ink); font-weight:700; }

  .summary{
    margin: clamp(6px, 1.5vh, 16px) clamp(10px, 3vw, 18px) 0;
    padding: clamp(10px, 2.2vh, 18px) clamp(10px, 3vw, 16px);
    background: var(--bg-deep);
    border-radius: 6px;
    color: var(--paper);
    position:relative;
    flex-shrink:0;
  }
  .summary-row{
    display:flex;
    justify-content:space-between;
    font-family:'Space Mono', monospace;
    font-size: 11px;
    color: #9FB8AE;
    margin-bottom: 8px;
  }
  .total-label{
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .total-amount{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: clamp(24px, 6vh, 34px);
    line-height:1.15;
    font-variant-numeric: tabular-nums;
    word-break: break-word;
  }
  .total-amount span.currency{
    font-size: 16px;
    font-weight:600;
    margin-left: 4px;
    color: #C7D9D1;
  }

  .actions{
    display:flex;
    gap: 10px;
    padding: clamp(8px, 2vh, 16px) clamp(10px, 3vw, 18px) clamp(10px, 2.5vh, 20px);
    flex-shrink:0;
  }
  .actions button{
    flex:1;
    padding: 11px 0;
    border-radius: 6px;
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size: 13px;
    cursor:pointer;
    border: 1px solid var(--paper-line);
    background:#fff;
    color: var(--ink);
  }
  .actions button.primary{
    background: var(--coral);
    border-color: var(--coral);
    color: #fff;
  }
  .actions button.credit{
    cursor: default;
    font-size: 12px;
    background: var(--bg-deep);
    border-color: var(--bg-deep);
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .actions button.credit:active{ transform: none; }
  .actions button:active{ transform: translateY(1px); }

  .footnote{
    text-align:center;
    font-size: 8px;
    letter-spacing: 0.03em;
    color: rgba(244,238,223,0.4);
    margin-top: clamp(4px, 1vh, 10px);
    font-family:'Space Mono', monospace;
    flex-shrink:0;
  }
</style>
</head>
<body>

<div style="width:100%; max-width:420px; height:100%; display:flex; flex-direction:column; justify-content:center;">
  <div class="receipt" id="receipt">
    <div class="rows" id="rows"></div>

    <div class="summary">
      <div class="summary-row">
        <span id="nbBillets">0 coupure renseignée</span>
        <span id="nbUnites">0 billet/pièce</span>
      </div>
      <div class="total-label">Totale vente</div>
      <div class="total-amount" id="total">0<span class="currency">FCFA</span></div>
    </div>

    <div class="actions">
      <button id="resetBtn" style="flex:1">Réinitialiser</button>
    </div>
  </div>
  <div class="footnote">conçu par Ismaël SANGARE</div>
</div>

  };

  const denominations = [
    { value: 10000, type: 'bill' },
    { value: 5000,  type: 'bill' },
    { value: 2000,  type: 'bill' },
    { value: 1000,  type: 'bill' },
    { value: 500,   type: 'bill' },
    { value: 200,   type: 'coin' },
    { value: 100,   type: 'coin' },
  ];

  const rowsEl = document.getElementById('rows');
  const totalEl = document.getElementById('total');
  const nbBilletsEl = document.getElementById('nbBillets');
  const nbUnitesEl = document.getElementById('nbUnites');
  const quantities = {};

  function formatFcfa(n){
    return n.toLocaleString('fr-FR').replace(/[\u00A0\u202F,]/g, ' ');
  }

  function render(){
    rowsEl.innerHTML = '';
    denominations.forEach(d => {
      quantities[d.value] = quantities[d.value] || 0;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="swatch${d.type === 'coin' ? ' coin' : ''}"><img src="${denomImages[d.value]}" alt="${d.value} FCFA"></div>
        <div class="label-block">
          <div class="denom-label">${formatFcfa(d.value)}</div>
          <div class="denom-sub">FCFA</div>
        </div>
        <div class="stepper">
          <button data-action="dec" data-denom="${d.value}" aria-label="Diminuer">−</button>
          <input type="number" min="0" inputmode="numeric" value="${quantities[d.value]}" data-denom="${d.value}" aria-label="Nombre de billets de ${d.value} FCFA">
          <button data-action="inc" data-denom="${d.value}" aria-label="Augmenter">+</button>
        </div>
        <div class="line-total" data-line="${d.value}">${formatFcfa(d.value * quantities[d.value])}</div>
      `;
      rowsEl.appendChild(row);
    });
    attachEvents();
    updateTotal();
  }

  function attachEvents(){
    rowsEl.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const denom = Number(btn.dataset.denom);
        const delta = btn.dataset.action === 'inc' ? 1 : -1;
        quantities[denom] = Math.max(0, (quantities[denom] || 0) + delta);
        syncRow(denom);
      });
    });
    rowsEl.querySelectorAll('input[data-denom]').forEach(input => {
      input.addEventListener('input', () => {
        const denom = Number(input.dataset.denom);
        let val = parseInt(input.value, 10);
        if (isNaN(val) || val < 0) val = 0;
        quantities[denom] = val;
        syncRow(denom, false);
      });
    });
  }

  function syncRow(denom, updateInput = true){
    const input = rowsEl.querySelector(`input[data-denom="${denom}"]`);
    const line = rowsEl.querySelector(`[data-line="${denom}"]`);
    if (updateInput) input.value = quantities[denom];
    const sub = quantities[denom] * denom;
    line.textContent = formatFcfa(sub);
    line.classList.toggle('active', quantities[denom] > 0);
    updateTotal();
  }

  function updateTotal(){
    let total = 0;
    let nbCoupures = 0;
    let nbUnites = 0;
    denominations.forEach(d => {
      const qty = quantities[d.value] || 0;
      if (qty > 0) nbCoupures++;
      nbUnites += qty;
      total += qty * d.value;
    });
    totalEl.innerHTML = formatFcfa(total) + '<span class="currency">FCFA</span>';
    nbBilletsEl.textContent = nbCoupures + (nbCoupures > 1 ? ' coupures renseignées' : ' coupure renseignée');
    nbUnitesEl.textContent = nbUnites + (nbUnites > 1 ? ' billets/pièces' : ' billet/pièce');
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    denominations.forEach(d => quantities[d.value] = 0);
    render();
  });

  render();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.log('Erreur Service Worker :', err));
    });
  }
</script>
